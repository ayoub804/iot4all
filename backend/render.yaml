# Render.com deployment config for the Express backend
services:
  - type: web
    name: iot4all-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false       # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false       # Set this manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        sync: false       # Set to your Firebase App Hosting URL after deploy
